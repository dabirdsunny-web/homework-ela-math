<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FreePass Proxy</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080c14;
      --surface: #0e1520;
      --border: #1e2d45;
      --accent: #00d4aa;
      --accent2: #0097ff;
      --text: #e2e8f0;
      --muted: #64748b;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow-x: hidden;
    }

    /* Animated background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0, 212, 170, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 212, 170, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .glow {
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
      z-index: 0;
    }
    .glow-1 { background: rgba(0, 212, 170, 0.07); top: -200px; left: -200px; }
    .glow-2 { background: rgba(0, 151, 255, 0.07); bottom: -200px; right: -200px; }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 680px;
      text-align: center;
    }

    .badge {
      display: inline-block;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--accent);
      border: 1px solid rgba(0, 212, 170, 0.3);
      padding: 4px 12px;
      border-radius: 999px;
      margin-bottom: 24px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    h1 {
      font-size: clamp(2.5rem, 8vw, 4rem);
      font-weight: 800;
      line-height: 1;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #fff 0%, var(--accent) 60%, var(--accent2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      color: var(--muted);
      font-size: 15px;
      margin-bottom: 40px;
      font-family: 'Space Mono', monospace;
    }

    .search-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 8px 8px 8px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .search-box:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0, 212, 170, 0.1), 0 0 30px rgba(0, 212, 170, 0.05);
    }

    .lock-icon {
      color: var(--accent);
      font-size: 18px;
      flex-shrink: 0;
    }

    #urlInput {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 14px;
      padding: 10px 0;
    }

    #urlInput::placeholder { color: var(--muted); }

    #goBtn {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 10px;
      color: #000;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 14px;
      padding: 12px 24px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
      flex-shrink: 0;
    }

    #goBtn:hover { opacity: 0.9; transform: scale(1.02); }
    #goBtn:active { transform: scale(0.98); }

    .quick-links {
      margin-top: 28px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
    }

    .quick-link {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      padding: 8px 16px;
      border-radius: 999px;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
    }

    .quick-link:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .stats {
      margin-top: 48px;
      display: flex;
      justify-content: center;
      gap: 40px;
    }

    .stat {
      text-align: center;
    }

    .stat-num {
      font-size: 22px;
      font-weight: 800;
      color: var(--accent);
    }

    .stat-label {
      font-size: 11px;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 2px;
    }

    .footer {
      margin-top: 48px;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--muted);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .container > * {
      animation: fadeUp 0.5s ease both;
    }
    .badge { animation-delay: 0s; }
    h1 { animation-delay: 0.05s; }
    .subtitle { animation-delay: 0.1s; }
    .search-box { animation-delay: 0.15s; }
    .quick-links { animation-delay: 0.2s; }
    .stats { animation-delay: 0.25s; }
    .footer { animation-delay: 0.3s; }
  </style>
</head>
<body>
  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>

  <div class="container">
    <div class="badge">🔒 Encrypted &nbsp;·&nbsp; Anonymous &nbsp;·&nbsp; Free</div>

    <h1>FreePass</h1>
    <p class="subtitle">// browse anywhere, privately</p>

    <div class="search-box">
      <span class="lock-icon">🌐</span>
      <input
        type="text"
        id="urlInput"
        placeholder="Enter a URL e.g. google.com"
        autocomplete="off"
        spellcheck="false"
      />
      <button id="goBtn" onclick="goProxy()">Browse →</button>
    </div>

    <div class="quick-links">
      <a class="quick-link" onclick="setUrl('google.com')">Google</a>
      <a class="quick-link" onclick="setUrl('youtube.com')">YouTube</a>
      <a class="quick-link" onclick="setUrl('reddit.com')">Reddit</a>
      <a class="quick-link" onclick="setUrl('wikipedia.org')">Wikipedia</a>
      <a class="quick-link" onclick="setUrl('github.com')">GitHub</a>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="stat-num">256-bit</div>
        <div class="stat-label">Encryption</div>
      </div>
      <div class="stat">
        <div class="stat-num">0 logs</div>
        <div class="stat-label">No tracking</div>
      </div>
      <div class="stat">
        <div class="stat-num">∞</div>
        <div class="stat-label">Bandwidth</div>
      </div>
    </div>

    <div class="footer">No registration required · Use responsibly</div>
  </div>

  <script>
    function setUrl(url) {
      document.getElementById('urlInput').value = url;
      goProxy();
    }

    function goProxy() {
      let url = document.getElementById('urlInput').value.trim();
      if (!url) return;
      if (!url.startsWith('http://') && !url.startsWith('https://')) {
        url = 'https://' + url;
      }
      window.location.href = '/proxy?url=' + encodeURIComponent(url);
    }

    document.getElementById('urlInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') goProxy();
    });
  </script>
</body>
</html>
